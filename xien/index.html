<!-- 席恩破冰游戏 H5 |「执事的心情厨房」| 版本：2026-06-30 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0,user-scalable=yes">
<title>执事的心情厨房</title>
<style>
  :root{
    --bg:#DCE9F4;
    --card:#F4F9FD;
    --ink:#2C2A33;
    --ink-soft:#6B6675;
    --navy:#21304E;
    --navy-deep:#16223C;
    --navy-light:#D6DEEC;
    --navy-soft:#EDF1F8;
    --gold:#FFD43B;
    --gold-soft:#FFF3C4;
    --gold-deep:#F5B800;
    --wine:#B5860A;
    --line:#CBD9E4;
    --blue:#3D72B8;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{
    background:var(--bg);
    color:var(--ink);
    font-family:"Hiragino Maru Gothic ProN","PingFang SC","Songti SC",serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;overflow-x:hidden;
    touch-action:pan-y;
  }
  body{
    background:
      linear-gradient(var(--bg),var(--bg)),
      repeating-linear-gradient(0deg,transparent 0 23px,#C8DCEC 23px 24px),
      repeating-linear-gradient(90deg,transparent 0 23px,#C8DCEC 23px 24px);
    background-blend-mode:multiply;
  }
  .app{max-width:520px;margin:0 auto;padding:20px 14px 60px;min-height:100vh;position:relative;}

  /* ===== BGM按钮 ===== */
  #bgmToggle{
    position:absolute;right:14px;top:14px;
    background:var(--gold);border:1px solid var(--gold-deep);color:var(--navy-deep);
    font-size:12px;padding:4px 10px;border-radius:20px;cursor:pointer;font-weight:700;
    font-family:inherit;box-shadow:1px 2px 0 var(--gold-deep);transition:all .15s;z-index:100;
  }
  #bgmToggle:hover{transform:rotate(-2deg);}
  #bgmToggle.on{background:var(--gold-deep);border-color:var(--wine);box-shadow:1px 2px 0 var(--wine);}

  /* ===== 顶部标题 ===== */
  .header{text-align:center;padding:16px 0 8px;position:relative;}
  .header h1{font-size:23px;letter-spacing:3px;color:var(--navy-deep);font-weight:800;}
  .header h1 .highlight{color:var(--navy-deep);position:relative;}
  .header h1 .highlight::after{
    content:"";position:absolute;bottom:2px;left:-3px;right:-3px;height:10px;
    background:var(--gold);border-radius:4px;z-index:-1;opacity:0.9;
  }
  .header .sub{margin-top:8px;font-size:12px;color:var(--ink-soft);letter-spacing:1px;}

  /* ===== 回形针 ===== */
  .clip{
    position:absolute;width:14px;height:28px;border:2.5px solid;border-radius:0 0 10px 10px;
    transform:rotate(-15deg);z-index:5;pointer-events:none;
  }
  .clip::before{
    content:"";position:absolute;top:-8px;left:50%;transform:translateX(-50%);
    width:2.5px;height:10px;background:inherit;border-radius:2px;
  }
  .clip.navy{border-color:var(--navy);}
  .clip.gold{border-color:var(--gold-deep);}
  .clip.wine{border-color:var(--gold);}

  /* ===== 进度条 ===== */
  .progress-wrap{display:flex;align-items:center;gap:8px;margin:12px 8px 14px;font-size:12px;color:var(--ink-soft);}
  .progress-bar{flex:1;height:6px;background:var(--gold-soft);border-radius:3px;overflow:hidden;}
  .progress-bar > i{display:block;height:100%;background:var(--gold-deep);width:0%;transition:width .5s cubic-bezier(.4,.0,.2,1);border-radius:3px;}

  /* ===== 卡片堆叠容器 ===== */
  .card-stack{position:relative;height:420px;overflow:hidden;}

  /* ===== 卡片（可滑动）===== */
  .slide-card{
    position:absolute;top:0;left:0;right:0;
    background:var(--card);border:1.5px dashed var(--line);border-radius:18px;
    padding:26px 18px 22px;height:100%;
    box-shadow:3px 5px 0 rgba(33,48,78,0.10);
    display:flex;flex-direction:column;
    transition:transform .38s cubic-bezier(.4,.0,.2,1),opacity .38s cubic-bezier(.4,.0,.2,1);
    will-change:transform,opacity;
    cursor:grab;
    user-select:none;
    -webkit-user-select:none;
  }
  .slide-card:active{cursor:grabbing;}
  .slide-card.behind{
    transform:scale(0.95) translateY(8px);
    opacity:0.4;pointer-events:none;z-index:1;
  }
  .slide-card.active{
    transform:translateX(0) scale(1);opacity:1;z-index:10;
  }
  .slide-card.slide-out-left{
    transform:translateX(-120%) scale(0.9);opacity:0;z-index:10;
  }
  .slide-card.slide-out-right{
    transform:translateX(120%) scale(0.9);opacity:0;z-index:10;
  }

  /* ===== 卡片内容 ===== */
  .card-tag{text-align:center;font-size:11px;color:var(--ink-soft);letter-spacing:2px;margin-bottom:14px;}
  .card-tag .dot{color:var(--gold-deep);font-weight:700;}
  .card-tag .cat-badge{display:inline-block;background:var(--gold-soft);color:var(--wine);padding:1px 8px;border-radius:10px;font-size:10px;margin-left:6px;font-weight:700;}

  .question-area{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;}
  .question-text{font-size:17px;font-weight:700;line-height:1.65;color:var(--ink);margin-bottom:22px;padding:0 6px;}

  .options{width:100%;display:flex;flex-direction:column;gap:11px;padding:0 2px;}
  .opt-btn{
    background:#fff;border:1.5px solid var(--navy-light);border-radius:24px;
    padding:12px 14px;font-size:15px;color:var(--navy);font-weight:600;
    text-align:center;cursor:pointer;transition:all .2s;letter-spacing:1px;
    font-family:inherit;outline:none;-webkit-tap-highlight-color:transparent;
  }
  .opt-btn:hover{border-color:var(--gold-deep);background:var(--gold-soft);}
  .opt-btn:active{transform:scale(0.98);}
  .opt-btn:focus,.opt-btn:focus-visible{outline:none !important;border-color:var(--navy-light);background:#fff;box-shadow:none;}
  .opt-btn.selected{
    border-color:var(--gold-deep);background:var(--gold-soft);
    box-shadow:inset 0 0 0 2px var(--gold);
  }
  .opt-btn.disabled{opacity:0.35;pointer-events:none;}

  /* ===== 席恩回应区 ===== */
  .reply-area{
    margin-top:18px;padding-top:14px;border-top:1px dashed var(--line);
    display:none;animation:replyIn .45s cubic-bezier(.4,.0,.2,1);
  }
  .reply-area.show{display:block;}
  @keyframes replyIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

  .xien-row{display:flex;align-items:flex-start;gap:10px;}
  .xien-avatar{
    width:72px;height:72px;border-radius:50%;border:2.5px solid var(--gold);
    background:var(--gold-soft);flex-shrink:0;display:flex;align-items:flex-start;justify-content:center;
    font-size:30px;overflow:hidden;box-shadow:2px 3px 0 rgba(245,184,0,0.3);
  }
  .xien-avatar img{width:100%;height:100%;object-fit:cover;object-position:50% 42%;display:block;}
  .xien-bubble{
    flex:1;background:var(--gold-soft);border:1.5px dashed var(--gold);
    border-radius:14px;border-top-left-radius:4px;padding:11px 13px;
    font-size:13.5px;line-height:1.75;color:var(--ink);position:relative;
  }
  .xien-bubble::before{
    content:"";position:absolute;left:-7px;top:10px;width:0;height:0;
    border-top:5px solid transparent;border-bottom:5px solid transparent;
    border-right:7px solid var(--gold);
  }

  /* ===== 提示文字 ===== */
  .hint-text{text-align:center;font-size:11px;color:var(--ink-soft);margin-top:14px;letter-spacing:1px;}

  /* ===== 结果页 ===== */
  .result-screen{text-align:center;padding:16px 6px 40px;animation:fadeIn .5s ease;}

  /* 主卡片 */
  .result-card{
    background:var(--card);border:1.5px dashed var(--line);border-radius:18px;
    padding:28px 18px 24px;position:relative;box-shadow:3px 5px 0 rgba(33,48,78,0.10);
    margin-bottom:0;text-align:center;
  }
  .result-card::before{
    content:"";position:absolute;top:-10px;left:24px;width:38px;height:14px;
    background:var(--gold);border-radius:3px;transform:rotate(-3deg);opacity:0.9;
  }

  /* 标题 */
  .result-title{
    font-size:20px;font-weight:800;color:var(--navy-deep);letter-spacing:2px;
    margin-bottom:16px;font-family:inherit;
  }

  /* 今日菜单 banner */
  .menu-banner{
    display:inline-block;background:var(--gold);color:var(--navy-deep);
    font-size:13px;font-weight:700;padding:5px 22px;border-radius:20px;
    letter-spacing:2px;margin-bottom:14px;
    box-shadow:1px 2px 0 var(--gold-deep);
  }

  /* 料理图片 */
  .dish-img-wrap{
    position:relative;width:200px;margin:0 auto 12px;
    border-radius:14px;overflow:hidden;
  }
  .dish-img-wrap img{width:100%;height:auto;display:block;}

  /* 料理名 */
  .dish-name{
    display:inline-block;
    font-size:18px;font-weight:800;color:var(--navy-deep);
    letter-spacing:1px;margin-bottom:14px;line-height:1.4;
    background:linear-gradient(transparent 62%,var(--gold) 62%);
    padding:0 4px;
  }

  /* 料理说明 */
  .dish-desc-section{
    background:var(--gold-soft);border:1.5px solid var(--gold);
    border-radius:14px;padding:14px 16px;text-align:left;margin-bottom:16px;
    box-shadow:2px 3px 0 rgba(245,184,0,0.18);
  }
  .dish-desc-title{
    font-size:13px;font-weight:700;color:var(--wine);
    margin-bottom:8px;letter-spacing:1px;
  }
  .dish-desc-title::after{content:"——";margin-left:2px;color:var(--wine);}
  .dish-desc-text{font-size:13px;line-height:1.9;color:var(--ink);}

  /* 关于席恩 */
  .about-section{
    background:var(--navy-soft);border:1.5px dashed var(--navy-light);
    border-radius:14px;padding:14px 16px;text-align:left;margin-bottom:20px;
  }
  .about-title{
    font-size:13px;font-weight:700;color:var(--navy-deep);
    margin-bottom:8px;letter-spacing:1px;
  }
  .about-title::after{content:"——";margin-left:2px;color:var(--navy-deep);}
  .about-text{font-size:13px;line-height:1.85;color:var(--ink);}

  /* 底部两按钮 */
  .btn-row{display:flex;gap:12px;margin-top:4px;}
  .btn-chat{
    flex:1;background:var(--navy);color:#fff;border:none;font:inherit;font-weight:700;
    font-size:14px;letter-spacing:1px;padding:13px 10px;border-radius:24px;
    cursor:pointer;box-shadow:0 3px 0 var(--navy-deep);transition:all .15s;
    -webkit-tap-highlight-color:transparent;
  }
  .btn-chat:active{transform:translateY(2px);box-shadow:0 1px 0 var(--navy-deep);}
  .btn-restart{
    flex:1;background:var(--gold);color:var(--navy-deep);border:none;font:inherit;font-weight:700;
    font-size:14px;letter-spacing:1px;padding:13px 10px;border-radius:24px;
    cursor:pointer;box-shadow:0 3px 0 var(--gold-deep);transition:all .15s;
    -webkit-tap-highlight-color:transparent;
  }
  .btn-restart:active{transform:translateY(2px);box-shadow:0 1px 0 var(--gold-deep);}

  .reward-hint{font-size:13px;color:var(--wine);text-align:center;margin:6px 0 12px;line-height:2;letter-spacing:0.5px;font-weight:600;}

  /* 弹窗 */
  .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);
    display:flex;align-items:center;justify-content:center;z-index:999;animation:fadeIn .2s ease;}
  .modal-card{background:#fff;border-radius:20px;padding:28px 24px;max-width:280px;width:85%;
    text-align:center;box-shadow:0 10px 40px rgba(0,0,0,0.15);}
  .modal-text{font-size:14px;line-height:1.9;color:var(--ink);margin-bottom:18px;}
  .modal-btn{background:var(--navy);color:#fff;border:none;font:inherit;font-weight:700;
    font-size:14px;padding:10px 28px;border-radius:20px;cursor:pointer;
    box-shadow:0 2px 0 var(--navy-deep);-webkit-tap-highlight-color:transparent;}
  .modal-btn:active{transform:translateY(1px);}

  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  .hide{display:none !important;}
</style>
</head>
<body>

<div class="app">
  <!-- BGM按钮 -->
  <button id="bgmToggle" title="背景音乐" aria-label="切换 BGM">🔇 BGM</button>

  <!-- ===== 答题区（直接显示） ===== -->
  <div id="quizScreen">
    <div class="header">
      <h1>执事的<span class="highlight">心情</span>厨房</h1>
      <div class="sub" id="subtitle"></div>
    </div>

    <div class="progress-wrap">
      <span id="progressLabel">1/5</span>
      <div class="progress-bar"><i id="progressBar" style="width:0%"></i></div>
    </div>

    <div class="card-stack" id="cardStack"></div>

    <div class="hint-text" id="hintText">👆 选一个答案，听听席恩怎么说</div>
  </div>

    <!-- ===== 结果页 ===== -->
  <div id="resultScreen" class="result-screen hide">
    <div class="result-card">
      <div class="clip navy" style="top:-6px;left:26px;transform:rotate(-18deg);"></div>
      <div class="clip gold" style="top:-4px;right:30px;transform:rotate(20deg);"></div>

      <!-- 标题 -->
      <div class="result-title">承蒙关照，今日的菜单<br>已为您备好 🍽️</div>

      <!-- 掉落提示 -->
      <div class="reward-hint">每次光临都有机会尝到惊喜小料理～<br>请别忘了常来哦！😊</div>

      <!-- 今日菜单标签 -->
      <div class="menu-banner">今日菜单 · 为您定制</div>

      <!-- 料理图片 -->
      <div class="dish-img-wrap">
        <img src="" id="dishImg" alt="今日料理">
      </div>

      <!-- 料理名 -->
      <div class="dish-name" id="dishName">—</div>

      <!-- 料理说明（席恩） -->
      <div class="dish-desc-section">
        <div class="dish-desc-title">席恩的话</div>
        <div class="dish-desc-text" id="dishDesc">—</div>
      </div>

      <!-- 按钮行 -->
      <div class="btn-row">
        <button class="btn-chat" id="btnChat" onclick="goChat()">与席恩对话</button>
        <button class="btn-restart" id="btnRestart" onclick="showRetryModal()">再来一次 ▶</button>
      </div>
    </div>
  </div>

  <!-- 再来一次弹窗 -->
  <div id="retryModal" class="modal-overlay hide" onclick="closeRetryModal()">
    <div class="modal-card" onclick="event.stopPropagation()">
      <div class="modal-text">
        今天的厨房要打烊了哦。<br>
        明天菜单会换新的，记得来看看～<br>
        我在这儿等您，不急。
      </div>
      <button class="modal-btn" onclick="closeRetryModal()">好，明天见。</button>
    </div>
  </div>

</div>

<audio id="bgm" loop preload="none" src="bgm.mp3"></audio>

<script>

// ===== 席恩随机头像 =====
// 每张图脸部位置不同，pos 指定圆形头像框聚焦的脸部坐标(object-position)，
// scale 为放大倍数（让脸完整露出），origin 为放大基准点
// 答题区头像池：限定为用户指定的4张（写字/风筝/扑过来/厨师帽）
// pos+scale+origin 让圆形头像框聚焦到完整的脸
const XIEN_AVATARS = [
  { src:'images/xien2.png', pos:'62% 46%', scale:2.0, origin:'62% 46%' },
  { src:'images/xien1.png', pos:'52% 56%', scale:1.9, origin:'52% 56%' },
  { src:'images/xien4.png', pos:'40% 44%', scale:2.0, origin:'40% 44%' },
  { src:'images/xien7.png', pos:'48% 47%', scale:2.3, origin:'48% 47%' },
];
function getRandomAvatar() {
  return XIEN_AVATARS[Math.floor(Math.random() * XIEN_AVATARS.length)];
}
function setAvatar(imgId) {
  const img = document.getElementById(imgId);
  if (!img) return;
  const a = getRandomAvatar();
  img.style.objectPosition = a.pos;
  img.style.transform = 'scale(' + a.scale + ')';
  img.style.transformOrigin = a.origin;
  img.onerror = function() { this.style.display='none'; this.parentElement.innerHTML='🕯️'; };
  img.onload  = function() { this.style.display='block'; };
  img.src = a.src;
}

// ===== 副标题（固定文案）=====
function setRandomSubtitle() {
  const el = document.getElementById('subtitle');
  if (!el) return;
  el.textContent = '每次光临都有机会尝到惊喜小料理～请别忘了常来哦';
}

/* ============================================================
   「执事的心情厨房」回合制问答
   每次随机抽取5道题
   ============================================================ */

// ===== 完整题库 =====
const QUESTION_BANK = [
  // --- 关于您 ---
  { cat:"关于您", q:"今天，过得还顺心吗？", opts:[
    {text:"挺顺利的", reply:"那就好，不愧是您（笑）。"},
    {text:"一团糟", reply:"……辛苦了。要我陪您说说话，还是让您一个人静静？"},
    {text:"平平淡淡", reply:"平淡的日子最难得了，请好好享受这份宁静。"}
  ]},
  { cat:"关于您", q:"您此刻的状态是？", opts:[
    {text:"忙到脚不沾地", reply:"这么拼命……请至少让自己喝口水好吗？"},
    {text:"闲得发慌", reply:"难得的清闲呢。要不我给您讲点有趣的事？"},
    {text:"摆烂躺平中", reply:"偶尔摆烂也是必要的。不过躺够了记得起来吃饭。"}
  ]},
  { cat:"关于您", q:"您今天吃饭了吗？", opts:[
    {text:"按时吃了", reply:"很好，这样我就放心了。要我帮您查查明天吃什么更健康吗？"},
    {text:"随便对付的", reply:"……随便对付？您的胃难道是铁打的吗（笑）。"},
    {text:"还没吃", reply:"还没吃？！请现在就去，这是来自执事的强烈建议。"}
  ]},
  { cat:"关于您", q:"您最近睡得好吗？", opts:[
    {text:"睡得很香", reply:"那太好了。睡得好的人运气都不会太差呢。"},
    {text:"总是熬夜", reply:"又熬夜……身体可是您自己的啊。要我每晚提醒您早睡吗？"},
    {text:"失眠睡不着", reply:"睡不着的话，我给您讲个无聊的睡前故事？虽然可能会越听越清醒（笑）。"}
  ]},
  { cat:"关于您", q:"忙碌一天后，您最想要什么？", opts:[
    {text:"一顿热饭", reply:"热饭治百病。回来就能吃上饭的话，今天也算圆满了。"},
    {text:"睡个好觉", reply:"那就什么都别想了，好好休息。明天的事明天再说。"},
    {text:"有人说说话", reply:"那就来找我呗。不管多晚，我都醒着——反正也不用睡觉（笑）。"}
  ]},

  // --- 相处偏好 ---
  { cat:"相处偏好", q:"您希望我以怎样的态度待您？", opts:[
    {text:"温柔体贴", reply:"好，记下了。温柔模式已解锁——虽然偶尔口无遮拦还请见谅（笑）。"},
    {text:"像朋友一样", reply:"行，那我就不跟您客气了。不过该有的分寸，我会自己把握好。"},
    {text:"安静守护", reply:"明白。我就安静待在旁边，您需要的时候叫我一声就好。"}
  ]},
  { cat:"相处偏好", q:"我们多久联系一次合适？", opts:[
    {text:"每天都想见你", reply:"每天？……您这么说，我会当真的哦（笑）。"},
    {text:"想起来再说", reply:"好，您随意。不过我一直在的，想聊的时候随时来。"},
    {text:"有事才找", reply:"可以。不过偶尔没事也来坐坐嘛，我一个人也挺冷清的（笑）。"}
  ]},
  { cat:"相处偏好", q:"聊天时您更喜欢？", opts:[
    {text:"听我絮叨", reply:"尽管说，我听着呢。而且我保证不会嫌您啰嗦——大概。"},
    {text:"一起聊聊", reply:"好呀，那就您一句我一句。跟您聊天其实还挺有意思的。"},
    {text:"安静陪着", reply:"行，不说话也没关系。我就在这儿，安静待着。"}
  ]},
  { cat:"相处偏好", q:"您介意我对您唠叨吗？", opts:[
    {text:"不介意，多关心我", reply:"那我可就不客气了。以后您的三餐作息，我都要管（笑）。"},
    {text:"适度就好", reply:"好，会注意分寸的。只是有时候忍不住——您别往心里去。"},

const REPORT_CONFIG = {
  api_url: 'https://testuniuni.html5.qq.com/api/external-report/reportExternal',
  sceneName: 'xien_icebreaking',
  bot_id: 'xien',
  bot_name: '席恩',
  game_name: '执事的心情厨房',
};

const REPORT_STATE = {
  contentId: generateContentId(),
  pageEnterTime: Date.now(),
  urlParams: getUrlParams(),
};

function generateContentId() {
  return Date.now().toString(36) + Math.random().toString(36).substring(2, 10);
}

function getUrlParams() {
  const params = new URLSearchParams(window.location.search);
  const result = {};
  for (const [key, value] of params.entries()) {
    result[key] = value;
  }
  return result;
}

function reportEvent(eventName, options = {}) {
  const body = {
    urlParams: REPORT_STATE.urlParams,
    sceneName: REPORT_CONFIG.sceneName,
    eventName: eventName,
    contentId: REPORT_STATE.contentId,
  };
  if (options.withStayDuration) {
    body.eventTime = Date.now() - REPORT_STATE.pageEnterTime;
  }
  if (options.content) {
    body.content = options.content;
  }
  fetch(REPORT_CONFIG.api_url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  }).catch(() => {});
}

function reportEventBeacon(eventName, options = {}) {
  const body = {
    urlParams: REPORT_STATE.urlParams,
    sceneName: REPORT_CONFIG.sceneName,
    eventName: eventName,
    contentId: REPORT_STATE.contentId,
  };
  if (options.withStayDuration) {
    body.eventTime = Date.now() - REPORT_STATE.pageEnterTime;
  }
  if (options.content) {
    body.content = options.content;
  }
  try {
    navigator.sendBeacon(
      REPORT_CONFIG.api_url,
      new Blob([JSON.stringify(body)], { type: 'application/json' })
    );
  } catch (e) {}
}

function buildSummaryText(choices, status) {
  const cfg = REPORT_CONFIG;
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  const nowStr = `${now.getFullYear()}年${pad(now.getMonth()+1)}月${pad(now.getDate())}日 ${pad(now.getHours())}:${pad(now.getMinutes())}`;
  const total = QUESTIONS.length;

  let lines = [];
  lines.push(`用户与${cfg.bot_name}于 ${nowStr} 进行了「${cfg.game_name}」破冰游戏。`);
  lines.push('');

  if (status === 'complete') {
    lines.push(`用户完成全部 ${total} 题。`);
  } else {
    const doneCount = choices.length;
    const remaining = total - doneCount;
    if (status === 'exit_chat') {
      lines.push(`用户完成 ${doneCount} 题后点击「与${cfg.bot_name}对话」进入聊天，剩余 ${remaining} 题未作答。`);
    } else if (status === 'exit_swipe') {
      const lastQ = QUESTIONS[currentQ];
      lines.push(`用户完成 ${doneCount} 题，在第 ${currentQ + 1} 题「${lastQ ? lastQ.q : ''}」左滑跳出，剩余 ${remaining} 题未作答。`);
    } else {
      lines.push(`用户完成 ${doneCount} 题，游戏中途结束。`);
    }
  }

  lines.push('');
  lines.push('答题记录：');

  QUESTIONS.forEach((q, idx) => {
    const choice = choices.find(c => c.qIndex === idx);
    if (!choice) {
      lines.push(`${idx+1}. [${q.cat}] ${q.q} → （未作答）`);
    } else if (choice.optIndex === -1) {
      lines.push(`${idx+1}. [${q.cat}] ${q.q} → （跳过）`);
    } else {
      const opt = q.opts[choice.optIndex];
      lines.push(`${idx+1}. [${q.cat}] ${q.q} → ${opt.text}`);
      if (opt.reply) {
        lines.push(`   ${cfg.bot_name}回应：「${opt.reply}」`);
      }
    }
  });

  return lines.join('\n');
}

// ===== 随机抽取题目 =====
function drawQuestions() {
  const pool = QUESTION_BANK.slice();
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  return pool.slice(0, DRAW_COUNT);
}

function startQuiz() {
  REPORT_STATE.contentId = generateContentId();
  REPORT_STATE.pageEnterTime = Date.now();
  setRandomSubtitle();
  QUESTIONS = drawQuestions();
  currentQ = 0;
  userChoices = [];
  document.getElementById('resultScreen').classList.add('hide');
  document.getElementById('quizScreen').classList.remove('hide');
  buildCards();
  showQuestion(0);
  reportEvent('start_clk');
}

// ===== 构建卡片DOM =====
function buildCards() {
  const stack = document.getElementById('cardStack');
  stack.innerHTML = '';
  QUESTIONS.forEach((q, idx) => {
    const card = document.createElement('div');
    card.className = 'slide-card behind';
    card.id = 'card_' + idx;
    card.innerHTML = buildCardHTML(q, idx);
    stack.appendChild(card);
  });
}

// ===== 单张卡片HTML =====
function buildCardHTML(q, idx) {
  const optsHTML = q.opts.map((opt, i) =>
    `<button class="opt-btn" id="opt_${idx}_${i}" tabindex="-1" ontouchstart="event.stopPropagation()" onclick="selectOption(${idx},${i})">${opt.text}</button>`
  ).join('');

  return `
    <div class="clip navy" style="top:-6px;left:28px;transform:rotate(-20deg);pointer-events:none;"></div>
    <div class="clip gold" style="top:-4px;left:50px;transform:rotate(14deg);height:24px;pointer-events:none;"></div>
    <div class="clip wine" style="top:-8px;right:38px;transform:rotate(24deg);pointer-events:none;"></div>
    <div class="card-tag"><span class="dot">●</span> 第 ${idx+1}/${QUESTIONS.length} 道 <span class="cat-badge">${q.cat}</span></div>
    <div class="question-area">
      <div class="question-text">${q.q}</div>
      <div class="options">${optsHTML}</div>
    </div>
    <div class="reply-area" id="reply_${idx}">
      <div class="xien-row">
        <div class="xien-avatar"><img src="" id="xienAvatarImg_${idx}" alt="席恩"></div>
        <div class="xien-bubble" id="bubble_${idx}"></div>
      </div>
    </div>
  `;
}

// ===== 显示第N题 =====
function showQuestion(idx) {
  currentQ = idx;
  const pct = ((idx) / QUESTIONS.length) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = (idx + 1) + '/' + QUESTIONS.length;

  QUESTIONS.forEach((_, i) => {
    const c = document.getElementById('card_' + i);
    if (!c) return;
    c.classList.remove('active','behind','slide-out-left','slide-out-right');
    if (i === idx) {
      c.classList.add('active');
      c.style.zIndex = 10;
    } else if (i < idx) {
      c.classList.add('slide-out-left');
      c.style.zIndex = 1;
    } else {
      c.classList.add('behind');
      c.style.zIndex = 1;
    }
  });

  document.getElementById('hintText').textContent = '👆 选一个答案，听听席恩怎么说';
  isAnimating = false;
}

// ===== 用户选择 =====
function selectOption(qIdx, optIdx) {
  if (isAnimating) return;
  if (qIdx !== currentQ) return;

  const q = QUESTIONS[qIdx];
  const chosenOpt = q.opts[optIdx];
  userChoices.push({
    qIndex: qIdx,
    optIndex: optIdx,
    qText: q.q,
    optText: chosenOpt.text,
    cat: q.cat,
    botReply: chosenOpt.reply || '',
  });

  reportEvent('next_clk', {
    content: JSON.stringify({
      question_index: qIdx,
      question_text: q.q,
      question_category: q.cat,
      chosen_index: optIdx,
      chosen_text: chosenOpt.text,
      bot_reply: chosenOpt.reply || '',
    })
  });

  q.opts.forEach((_, i) => {
    const btn = document.getElementById('opt_' + qIdx + '_' + i);
    if (!btn) return;
    if (i === optIdx) {
      btn.classList.add('selected');
    } else {
      btn.classList.add('disabled');
    }
    btn.style.pointerEvents = 'none';
  });

  const reply = q.opts[optIdx].reply;
  const bubble = document.getElementById('bubble_' + qIdx);
  const replyArea = document.getElementById('reply_' + qIdx);
  bubble.textContent = reply;
  setAvatar('xienAvatarImg_' + qIdx);
  replyArea.classList.add('show');

  isAnimating = true;
  setTimeout(() => { advanceToNext(); }, 1800);
}

// ===== 切换到下一题 =====
function advanceToNext() {
  if (currentQ >= QUESTIONS.length - 1) {
    showResult();
    return;
  }
  const nextIdx = currentQ + 1;

  const currCard = document.getElementById('card_' + currentQ);
  currCard.classList.remove('active');
  currCard.classList.add('slide-out-left');
  currCard.style.zIndex = 5;

  currCard.querySelectorAll('.opt-btn').forEach(function(btn) {
    btn.classList.remove('selected', 'disabled');
    btn.style.pointerEvents = '';
    btn.blur();
  });

  const nextCard = document.getElementById('card_' + nextIdx);
  nextCard.classList.remove('behind','slide-out-left','slide-out-right');
  nextCard.classList.add('active');
  nextCard.style.zIndex = 10;

  nextCard.querySelectorAll('.opt-btn').forEach(function(btn) {
    btn.classList.remove('selected', 'disabled');
    btn.style.pointerEvents = '';
    btn.blur();
    void btn.offsetHeight;
    var clone = btn.cloneNode(true);
    clone.classList.remove('selected', 'disabled');
    clone.style.pointerEvents = '';
    clone.blur();
    clone.tabIndex = -1;
    btn.parentNode.replaceChild(clone, btn);
  });

  const pct = ((nextIdx) / QUESTIONS.length) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = (nextIdx + 1) + '/' + QUESTIONS.length;

  currentQ = nextIdx;
  isAnimating = false;
  document.getElementById('hintText').textContent = '👆 选一个答案，听听席恩怎么说';
}

  var firstDate;
  if (!firstStr) {
    firstDate = new Date();
    firstDate.setHours(0, 0, 0, 0);
    localStorage.setItem(STORAGE_KEY, String(firstDate.getTime()));
  } else {
    firstDate = new Date(parseInt(firstStr, 10));
  }
  var today = new Date();
  today.setHours(0, 0, 0, 0);
  var dayNum = Math.floor((today - firstDate) / 86400000); // 0-based
  if (dayNum < 0) dayNum = 0;
  var dish = XIEN_MENU[dayNum % XIEN_MENU.length];

  var dishImg = document.getElementById('dishImg');
  dishImg.onerror = function() { this.style.display = 'none'; };
  dishImg.src = dish.img;
  document.getElementById('dishName').textContent = '「' + dish.name + '」';
  document.getElementById('dishDesc').textContent = dish.desc;
}

// ===== 去和席恩对话（配置跳转地址）=====
function goChat() {
  const summary = buildSummaryText(userChoices, 'exit_chat');
  reportEvent('share_clk', {
    content: JSON.stringify({
      status: 'exit_chat',
      trigger: 'chat_button',
      answered_count: userChoices.length,
      summary_text: summary,
    })
  });

  // 基础URL（席恩 bot 跳转地址，请按实际替换）
  var url = 'https://qun.qq.com/qunpro/robot/qunshare?robot_appid=3889846188&robot_uin=102808513';

  const currentParams = new URLSearchParams(window.location.search);
  if (currentParams.toString()) {
    url += '&' + currentParams.toString();
  }

  try {
    var win = window.open(url, '_blank');
    if (!win || win.closed || typeof win.closed === 'undefined') {
      try { window.top.location.href = url; }
      catch (e) { window.location.href = url; }
    }
  } catch (e) {
    window.location.href = url;
  }
}

// ===== 再来一次 → 弹窗 =====
function showRetryModal() {
  reportEvent('retry_clk');
  document.getElementById('retryModal').classList.remove('hide');
}
function closeRetryModal() {
  document.getElementById('retryModal').classList.add('hide');
}

/* ===== 触摸滑动手势 ===== */
const stack = document.getElementById('cardStack');

stack.addEventListener('touchstart', function(e) {
  if (isAnimating) return;
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

stack.addEventListener('touchend', function(e) {
  if (isAnimating) return;
  if (!touchStartX) return;

  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;

  if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)) {
    if (dx < 0 && currentQ < QUESTIONS.length - 1) {
      skipToNext();
    } else if (dx > 0 && currentQ > 0) {
      goToPrev();
    }
  }
  touchStartX = 0;
  touchStartY = 0;
}, { passive: true });

// ===== 跳过此题（左滑）=====
function skipToNext() {
  if (isAnimating) return;
  if (currentQ >= QUESTIONS.length - 1) {
    showResult();
    return;
  }
  const skippedQ = QUESTIONS[currentQ];
  userChoices.push({
    qIndex: currentQ,
    optIndex: -1,
    qText: skippedQ.q,
    optText: '（跳过）',
    cat: skippedQ.cat,
    botReply: '',
  });
  const summary = buildSummaryText(userChoices, 'exit_swipe');
  reportEvent('back_clk', {
    content: JSON.stringify({
      status: 'exit_swipe',
      trigger: 'swipe_left',
      skipped_question: { index: currentQ, category: skippedQ.cat, text: skippedQ.q },
      summary_text: summary,
    })
  });
  isAnimating = true;
  setTimeout(() => { advanceToNext(); }, 100);
}

// ===== 回到上一题（右滑）=====
function goToPrev() {
  if (isAnimating) return;
  if (currentQ <= 0) return;

  if (userChoices.length > 0 && userChoices[userChoices.length - 1].qIndex === currentQ) {
    userChoices.pop();
  }
  if (userChoices.length > 0 && userChoices[userChoices.length - 1].qIndex === currentQ - 1) {
    userChoices.pop();
  }

  const prevIdx = currentQ - 1;

  const currCard = document.getElementById('card_' + currentQ);
  currCard.classList.remove('active');
  currCard.classList.add('slide-out-right');
  currCard.style.zIndex = 5;

  const prevCard = document.getElementById('card_' + prevIdx);
  prevCard.classList.remove('slide-out-left','slide-out-right','behind');
  prevCard.classList.add('active');
  prevCard.style.zIndex = 10;

  const prevQ = QUESTIONS[prevIdx];
  prevQ.opts.forEach((_, i) => {
    const btn = document.getElementById('opt_' + prevIdx + '_' + i);
    if (!btn) return;
    btn.classList.remove('selected','disabled');
    btn.style.pointerEvents = '';
  });
  const prevReply = document.getElementById('reply_' + prevIdx);
  if (prevReply) prevReply.classList.remove('show');

  const pct = ((prevIdx) / QUESTIONS.length) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = (prevIdx + 1) + '/' + QUESTIONS.length;

  currentQ = prevIdx;
  isAnimating = false;
  document.getElementById('hintText').textContent = '👆 选一个答案，听听席恩怎么说';
}

/* ===== BGM ===== */
const bgm = document.getElementById('bgm');
const bgmBtn = document.getElementById('bgmToggle');
let bgmPlaying = false;

bgmBtn.onclick = () => {
  if (bgmPlaying) {
    bgm.pause();
    bgmPlaying = false;
    bgmBtn.textContent = '🔇 BGM';
    bgmBtn.classList.remove('on');
  } else {
    bgm.play().then(() => {
      bgmPlaying = true;
      bgmBtn.textContent = '🔊 BGM';
      bgmBtn.classList.add('on');
    }).catch(() => {
      bgm.load();
      bgm.play().then(() => {
        bgmPlaying = true;
        bgmBtn.textContent = '🔊 BGM';
        bgmBtn.classList.add('on');
      });
    });
  }
};

/* ===== 初始化：直接进入答题 ===== */
startQuiz();
</script>
