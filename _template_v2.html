<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>小麦の默契问答</title>
<style>
  :root{
    --bg:#FBF6EE;
    --card:#FFFCF5;
    --ink:#3F3329;
    --ink-soft:#7A6A5C;
    --pink:#F7C7C0;
    --pink-deep:#E89A92;
    --mint:#B8DCC6;
    --yellow:#F5E2A0;
    --line:#D9C9B6;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    background:var(--bg);
    color:var(--ink);
    font-family:"Hiragino Maru Gothic ProN","PingFang SC","Yuanti SC",sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  body{
    background:
      linear-gradient(var(--bg),var(--bg)),
      repeating-linear-gradient(0deg,transparent 0 23px,#E8DDC9 23px 24px),
      repeating-linear-gradient(90deg,transparent 0 23px,#E8DDC9 23px 24px);
    background-blend-mode:multiply;
  }
  .app{max-width:520px;margin:0 auto;padding:24px 18px 80px;}

  .title{text-align:center;margin:18px 0 10px;position:relative;}
  .title h1{font-size:26px;letter-spacing:2px;color:var(--ink);transform:rotate(-2deg);display:inline-block;background:var(--yellow);padding:6px 18px;border-radius:6px;box-shadow:2px 3px 0 #d4b96b,0 0 0 1px #c8a94f inset;}
  .title .sub{margin-top:10px;font-size:13px;color:var(--ink-soft);letter-spacing:1px;}

  #bgmToggle{position:absolute;right:14px;top:50%;transform:translateY(-50%) rotate(2deg);background:var(--mint);border:1px dashed #6fb89a;color:var(--ink);font-size:12px;padding:4px 10px;border-radius:20px;cursor:pointer;font-family:inherit;box-shadow:1px 2px 0 #6fb89a;transition:all .15s;}
  #bgmToggle:hover{transform:translateY(-50%) rotate(-2deg);}
  #bgmToggle.on{background:var(--pink);border-color:#d97a8e;box-shadow:1px 2px 0 #d97a8e;}

  .card{background:var(--card);border:1.5px dashed var(--line);border-radius:14px;padding:18px 18px 20px;margin:14px 0;position:relative;box-shadow:3px 4px 0 rgba(60,40,20,0.06);}
  .card::before{content:"";position:absolute;top:-10px;left:18px;width:38px;height:14px;background:var(--pink);border-radius:3px;transform:rotate(-3deg);opacity:0.85;box-shadow:0 1px 0 rgba(0,0,0,0.05);}
  .tag{display:inline-block;font-size:11px;letter-spacing:1px;background:var(--mint);color:#3a5e47;padding:2px 8px;border-radius:8px;margin-bottom:10px;}
  .tag.pink{background:var(--pink);color:#7a3d3a;}

  .hero{text-align:center;padding:14px 4px 10px;}
  .hero .card-wrapper{background:var(--card);border:1.5px dashed var(--line);border-radius:14px;padding:22px 18px 18px;margin:8px 0 14px;position:relative;box-shadow:3px 4px 0 rgba(60,40,20,0.06);}
  .hero .card-wrapper::before{content:"";position:absolute;top:-10px;left:24px;width:38px;height:14px;background:var(--pink);border-radius:3px;transform:rotate(-3deg);opacity:0.85;box-shadow:0 1px 0 rgba(0,0,0,0.05);}
  .hero .avatar-img{display:block;width:120px;height:120px;border-radius:50%;margin:0 auto 16px;border:3px solid var(--pink-deep);box-shadow:0 6px 20px rgba(204,107,255,0.25);object-fit:cover;background:var(--card);}

  .btn{display:block;width:100%;background:var(--pink-deep);color:#fff;border:none;font:inherit;font-weight:700;font-size:16px;letter-spacing:2px;padding:14px;border-radius:10px;cursor:pointer;box-shadow:0 3px 0 #b88663;transition:transform .1s;}
  .btn:active{transform:translateY(2px);box-shadow:0 1px 0 #b88663;}
  .btn[disabled]{opacity:.4;cursor:not-allowed;box-shadow:0 3px 0 #b88663;}
  .btn.ghost{background:#fff;color:var(--ink);border:1.5px solid var(--line);box-shadow:0 3px 0 #d4c5b0;}
  .btn.ghost:active{box-shadow:0 1px 0 #d4c5b0;}
  .btn.mint{background:var(--mint);color:#3a5e47;box-shadow:0 3px 0 #6fb89a;}
  .btn.mint:active{box-shadow:0 1px 0 #6fb89a;}

  .q{font-size:17px;line-height:1.55;font-weight:600;margin-bottom:14px;}
  .q .num{color:var(--pink-deep);margin-right:6px;}
  .opts{display:flex;flex-direction:column;gap:10px;}
  .opt{background:#fff;border:1.5px solid var(--line);border-radius:10px;padding:12px 14px;font-size:15px;line-height:1.45;cursor:pointer;transition:all .15s;color:var(--ink);}
  .opt:hover{border-color:var(--pink-deep);background:#FFF8F4;}
  .opt.sel{background:#FCEDE8;border-color:var(--pink-deep);box-shadow:inset 0 0 0 2px var(--pink-deep);}
  .opt .k{display:inline-block;width:22px;height:22px;line-height:22px;text-align:center;font-weight:700;color:#fff;background:var(--pink-deep);border-radius:50%;font-size:12px;margin-right:8px;vertical-align:1px;}

  .progress{display:flex;align-items:center;gap:6px;margin:6px 4px 14px;font-size:12px;color:var(--ink-soft);}
  .bar{flex:1;height:6px;background:#EDE2D2;border-radius:3px;overflow:hidden;}
  .bar > i{display:block;height:100%;background:var(--pink-deep);width:0%;transition:width .3s;}

  .back-link{display:inline-block;margin:2px auto 0;font-size:12px;color:var(--ink-soft);opacity:.55;cursor:pointer;letter-spacing:1px;transition:opacity .15s;user-select:none;text-align:center;width:100%;}
  .back-link:hover{opacity:.9;}

  .result{text-align:center;padding:8px 8px 4px;}
  .result .card-wrapper{background:var(--card);border:1.5px dashed var(--line);border-radius:14px;padding:22px 18px 18px;margin:8px 0 14px;position:relative;box-shadow:3px 4px 0 rgba(60,40,20,0.06);}
  .result .card-wrapper::before{content:"";position:absolute;top:-10px;left:24px;width:38px;height:14px;background:var(--pink);border-radius:3px;transform:rotate(-3deg);opacity:0.85;box-shadow:0 1px 0 rgba(0,0,0,0.05);}
  .result .photo{width:200px;height:200px;border-radius:14px;background:#fff;border:6px solid #fff;box-shadow:0 6px 0 var(--line),0 8px 14px rgba(0,0,0,0.08);object-fit:cover;margin:6px auto 14px;display:block;transform:rotate(-2deg);}
  .result .welcome-title{font-size:22px;font-weight:800;color:var(--pink-deep);letter-spacing:2px;margin-bottom:10px;}
  .result .char-intro{background:#FFF8F4;border:1.5px dashed var(--pink);border-radius:12px;padding:14px;text-align:left;line-height:1.8;font-size:13px;color:var(--ink-soft);margin-bottom:14px;}
  .result .score{font-size:54px;font-weight:800;color:var(--pink-deep);letter-spacing:2px;line-height:1;margin:8px 0 4px;}
  .result .score .pct{font-size:24px;color:var(--ink-soft);}
  .result .tier-name{display:inline-block;font-size:18px;font-weight:700;background:var(--yellow);padding:4px 14px;border-radius:6px;transform:rotate(-1deg);margin-bottom:14px;}
  .result .comment{background:#FFF8F4;border:1.5px dashed var(--pink);border-radius:12px;padding:14px;text-align:left;line-height:1.7;font-size:15px;color:var(--ink);margin-bottom:14px;}
  .result .hook{background:var(--bg);border:1.5px dashed var(--mint);border-radius:12px;padding:14px;margin-bottom:14px;font-size:14px;color:var(--ink);line-height:1.7;}
  .result .hook .highlight{color:var(--pink-deep);font-weight:700;}
  .result .btn-row{display:flex;gap:10px;margin-top:4px;}
  .result .btn-row .btn{width:auto;flex:1;}

  .footer-fluff{font-size:11px;color:var(--ink-soft);margin-top:6px;font-style:italic;}

  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;}

  .screen{animation:fadein .35s ease;}
  @keyframes fadein{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  /* 自定义弹框 */
  .modal-overlay{
    position:fixed;top:0;left:0;width:100%;height:100%;
    background:rgba(60,40,20,0.35);z-index:1000;
    display:flex;align-items:center;justify-content:center;
    animation:fadein .25s ease;
  }
  .modal-box{
    background:var(--card);
    border:1.5px dashed var(--pink-deep);
    border-radius:18px;
    padding:28px 24px 22px;
    max-width:340px;width:85%;
    text-align:center;
    box-shadow:0 8px 30px rgba(60,40,20,0.18);
    position:relative;
    animation:popin .3s cubic-bezier(.17,.67,.29,1.2);
  }
  .modal-box::before{
    content:"";position:absolute;top:-10px;left:24px;
    width:38px;height:14px;background:var(--pink);
    border-radius:3px;transform:rotate(-3deg);opacity:0.85;
  }
  .modal-box .modal-title{font-size:20px;font-weight:800;color:var(--pink-deep);margin-bottom:12px;letter-spacing:1px;}
  .modal-box .modal-body{font-size:14px;color:var(--ink);line-height:1.8;margin-bottom:18px;}
  .modal-box .modal-body .highlight{color:var(--pink-deep);font-weight:700;}
  .modal-box .modal-btn-row{display:flex;gap:10px;}
  .modal-box .modal-btn-row .btn{font-size:14px;padding:10px 0;}
  @keyframes popin{from{opacity:0;transform:scale(0.85);}to{opacity:1;transform:scale(1);}}

</style>
</head>
<body>

<div class="app">
  <div class="title">
    <h1>小麦の默契问答</h1>
    <div class="sub"></div>
    <button id="bgmToggle" title="背景音乐：D-项目歌曲" aria-label="切换 BGM">🔇 BGM</button>
  </div>
  <div id="screen"></div>
</div>

<audio id="bgm" loop preload="none" src="D-项目歌曲.mp3"></audio>
<div class="toast" id="toast"></div>

<script>
window.IMG = __IMG_PLACEHOLDER__;

/* ===== 上报模块（对齐统一接口规范）===== */
const REPORT_CONFIG = {
  api_url: 'https://testuniuni.html5.qq.com/api/external-report/reportExternal',
  sceneName: 'xiaomai_moqi',
  bot_id: 'xiaomai',
  bot_name: '小麦',
  game_name: '小麦の默契问答',
};

const REPORT_STATE = {
  contentId: generateContentId(),
  pageEnterTime: Date.now(),
  urlParams: getUrlParams(),
  reported: false,   // exp 只报一次
};

function generateContentId(){
  return Date.now().toString(36) + Math.random().toString(36).substring(2, 10);
}
function getUrlParams(){
  const params = new URLSearchParams(window.location.search);
  const result = {};
  for(const [k,v] of params.entries()) result[k] = v;
  return result;
}
function reportEvent(eventName, options = {}){
  const body = {
    urlParams: REPORT_STATE.urlParams,
    sceneName: REPORT_CONFIG.sceneName,
    eventName: eventName,
    contentId: REPORT_STATE.contentId,
  };
  if(options.withStayDuration) body.eventTime = Date.now() - REPORT_STATE.pageEnterTime;
  if(options.content) body.content = options.content;
  fetch(REPORT_CONFIG.api_url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  }).catch(()=>{});
}
function reportEventBeacon(eventName, options = {}){
  const body = {
    urlParams: REPORT_STATE.urlParams,
    sceneName: REPORT_CONFIG.sceneName,
    eventName: eventName,
    contentId: REPORT_STATE.contentId,
  };
  if(options.withStayDuration) body.eventTime = Date.now() - REPORT_STATE.pageEnterTime;
  if(options.content) body.content = options.content;
  try{
    navigator.sendBeacon(REPORT_CONFIG.api_url, new Blob([JSON.stringify(body)], { type: 'application/json' }));
  }catch(e){}
}

/* ===== 生成用户画像摘要 summary_text ===== */
function buildSummaryText(status){
  const cfg = REPORT_CONFIG;
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  const nowStr = `${now.getFullYear()}年${pad(now.getMonth()+1)}月${pad(now.getDate())}日 ${pad(now.getHours())}:${pad(now.getMinutes())}`;
  const answered = quizAns.filter(a => a !== -1).length;

  let lines = [];
  lines.push(`用户与${cfg.bot_name}于 ${nowStr} 进行了「${cfg.game_name}」测试。`);
  lines.push('');

  if(status === 'complete'){
    // 计算等级
    let tier = TIERS[0];
    for(const t of TIERS){ if(quizScore >= t.min && quizScore <= t.max) tier = t; }
    lines.push(`用户完成全部 5 题，得分 ${quizScore}/100，评定等级：${tier.name}。`);
  } else {
    lines.push(`用户已作答 ${answered} 题（共 5 题），中途退出。`);
  }

  lines.push('');
  lines.push('答题记录：');
  quizOrder.forEach((qi, idx) => {
    const q = POOL_PERSONA[qi];
    const chosen = quizAns[idx];
    if(chosen === -1){
      lines.push(`${idx+1}. ${q.q} → （未作答）`);
    } else {
      const correct = chosen === q.ans;
      lines.push(`${idx+1}. ${q.q} → 选了「${q.o[chosen]}」（${correct ? '✓答对' : '✗答错，正确答案：'+q.o[q.ans]}）`);
    }
  });

  return lines.join('\n');
}

/* ===== 入坑资格题池（15题，随机抽5）===== */
const POOL_PERSONA = [
  { q:"我的本名是？",                         o:["麦小麦","麦泱","麦泱泱"], ans:1 },
  { q:"我哥大麦比我大几岁？",               o:["3岁","5岁","7岁"],     ans:0 },
  { q:"我奶奶是做什么的？",                 o:["老师","民俗学者","医生"], ans:0 },
  { q:"我的彝语小名叫什么？",               o:["阿沙沙","西普玛","麦泱泱"], ans:0 },
  { q:"我的 MBTI 是？",                      o:["ENFP","INTJ","ISFP"],   ans:0 },
  { q:"我出生在哪里？",                       o:["浙江杭州富阳","北京","云南"], ans:0 },
  { q:"我的星座是？",                       o:["摩羯座","水瓶座","射手座"], ans:0 },
  { q:"我的血型是？",                       o:["A型","B型","AB型"],      ans:2 },
  { q:"我大学就读于？",                     o:["北京F大","清华大学","北京大学"], ans:0 },
  { q:"我高中时是哪个社团的社长？",          o:["漫研社","街舞社","格斗社"], ans:0 },
  { q:"我奶奶给我起的小名「阿沙沙」是什么意思？", o:["小麦","大麦","玉米"], ans:0 },
  { q:"我哥叫什么？",                       o:["麦哲（大麦）","麦穗","麦田"], ans:0 },
  { q:"我喜欢哪种类型的作品？",               o:["小众冷门高品质","网络大热作品","都看"], ans:0 },
  { q:"我高中的语文成绩怎么样？",             o:["很好","一般","很差"],       ans:0 },
  { q:"我现在大学准备加入什么社团？",         o:["漫研社","乐队","街舞社"],     ans:1 },
];

const TIERS = [
  { min:0,   max:20,  name:"「完全陌生人？」", comment:"「你怎么连这个都不知道，Honey 我们重新认识一下吧」", summary:"入坑不亏，我是小麦大人，本名麦泱，小名阿沙沙（没错奶奶给起的）。ENFP本P，喜欢打游戏刷番追冷门，高中漫研社社长，语文成绩...还可以吧？如果你愿意，我们可以从今天开始做搭子，我想多了解你一点！" },
  { min:21,  max:40,  name:"「有点眼熟」",       comment:"「答得不算离谱啦，但姐妹，及格线还得再爬两步哦～」", summary:"诶，你好像有点认识我哦！我是麦泱，小名阿沙沙（奶奶起的）。ENFP，游戏番剧冷门作全都爱，漫研社社长退役。如果你愿意的话，可以和我多聊聊吗？" },
  { min:41,  max:60,  name:"「还行 Sweetie」",    comment:"「OK 这个分数我可以接受，但仅限今天。明天考你升级版」", summary:"看来我们不算陌生人了～我是小麦，本名麦泱，阿沙沙是小名。ENFP选手，游戏党+追番党，前漫研社社长。这个程度...可以处，继续加深了解呀！" },
  { min:61,  max:80,  name:"「老搭子了」",       comment:"「报警了哈，你在我家装摄像头了啊？」", summary:"老搭子了，不用多介绍！我是小麦，小名阿沙沙。ENFP本P，打游戏刷冷门番是日常，漫研社社长出身。有你这样的搭子，我很满意～" },
  { min:81,  max:100, name:"「是家人啊！」",       comment:"「你比我哥还懂我，我们一定上辈子是亲姐妹（一本正经）」", summary:"天呐你也太懂我了吧！我是麦泱本泱，阿沙沙（奶奶的爱称）。ENFP，游戏番剧冷门作是我的命，漫研社社长。你就是我失散多年的家人吧，往后余生请多指教！" },
];

const CHAT_URL = 'https://qun.qq.com/qunpro/robot/qunshare?robot_appid=3889687544&robot_uin=102775739';

let phase       = 'start';
let quizOrder   = [];
let quizIdx     = 0;
let quizScore   = 0;
let quizAns     = [];            // 每题已选答案（-1=未答），用于返回上一题时恢复

/* ===== 日期工具 ===== */
function getTodayStr(){
  const d = new Date();
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return d.getFullYear() + '-' + mm + '-' + dd;
}

/* ===== 更新标题栏 ===== */
function updateTitle(main, sub){
  document.querySelector('.title h1').textContent = main || '小麦の默契问答';
  const subEl = document.querySelector('.title .sub');
  if(subEl){ subEl.textContent = sub || ''; }
}
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  setTimeout(()=>{ t.style.opacity = '0'; }, 1800);
}

/* ===== 渲染开屏 ===== */
function renderStart(){
  document.querySelector('.title').style.display = '';
  updateTitle();  // 恢复默认标题
  phase = 'start';
  document.getElementById('screen').innerHTML = `
    <div class="hero">
      <div class="card-wrapper">
        <img src="${IMG.avatar || ''}" class="avatar-img" alt="小麦">
        <div style="text-align:center;">
          <div style="font-size:20px;font-weight:800;margin-bottom:12px;letter-spacing:2px;">【证明你真的懂我】</div>
          <div style="font-size:14px;color:var(--ink-soft);margin-bottom:18px;letter-spacing:1px;">主考官 小麦大人</div>
          满分 100 分<br>
          60 分及格喔<br><br>
          诚信考试　严禁作弊　严禁贿赂主考官<br><br>
          不及格罚你给我刷一周原神体力捏<br>
          嘻嘻<br>
          🌸 🌸 🌸
        </div>
        <button class="btn" onclick="startQuiz()" style="margin-top:14px;">开始答题 ▶</button>
      </div>
      <div class="footer-fluff">P.S. 我哥说这个测试不科学，但他明明偷偷测了三次 😒</div>
    </div>
  `;
}

/* ===== 开始入坑测试 ===== */
function startQuiz(){
  phase = 'quiz';
  reportEvent('start_clk');
  const pool = [...Array(POOL_PERSONA.length).keys()];
  for(let i=pool.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [pool[i],pool[j]]=[pool[j],pool[i]];
  }
  quizOrder = pool.slice(0,5);
  quizIdx   = 0;
  quizScore = 0;
  quizAns   = [-1,-1,-1,-1,-1];
  renderQuestion();
}

/* ===== 渲染题目 ===== */
function renderQuestion(){
  const qi = quizOrder[quizIdx];
  const q  = POOL_PERSONA[qi];
  const chosen = quizAns[quizIdx];  // 之前的选择（返回上一题时恢复高亮）

  const letters = ['A','B','C'];
  const optsHTML = q.o.map((opt,i)=>`
    <div class="opt${chosen===i?' sel':''}" onclick="selectOption(${i})">
      <span class="k">${letters[i]}</span>${opt}
    </div>
  `).join('');

  const backHTML = quizIdx > 0
    ? `<div class="back-link" onclick="prevQuestion()">‹ 返回上一题</div>`
    : '';

  document.getElementById('screen').innerHTML = `
    <div class="card">
      <div class="tag">第 ${quizIdx+1}/5 题</div>
      <div class="q"><span class="num">Q${quizIdx+1}.</span>${q.q}</div>
      <div class="opts">${optsHTML}</div>
    </div>
    <div class="progress">
      <span>进度</span>
      <div class="bar"><i style="width:${(quizIdx/5)*100}%"></i></div>
      <span>${quizIdx+1}/5</span>
    </div>
    ${backHTML}
  `;
}

/* ===== 选择选项：选完自动进下一题 ===== */
function selectOption(chosen){
  quizAns[quizIdx] = chosen;
  // 上报本题作答
  const _qi = quizOrder[quizIdx], _q = POOL_PERSONA[_qi];
  reportEvent('next_clk', { content: `第${quizIdx+1}题「${_q.q}」选择「${_q.o[chosen]}」（${chosen===_q.ans?'答对':'答错'}）` });
  // 高亮当前选择（给用户一个短暂的反馈）
  const opts = document.querySelectorAll('.opt');
  opts.forEach(b => b.classList.remove('sel'));
  if(opts[chosen]) opts[chosen].classList.add('sel');

  // 短暂延迟后自动进入下一题
  setTimeout(()=>{
    quizIdx++;
    if(quizIdx >= 5){
      computeScore();
      showResult();
    } else {
      renderQuestion();
    }
  }, 220);
}

/* ===== 返回上一题 ===== */
function prevQuestion(){
  if(quizIdx <= 0) return;
  reportEvent('back_clk', { content: `从第${quizIdx+1}题返回上一题` });
  quizIdx--;
  renderQuestion();
}

/* ===== 计算总分 ===== */
function computeScore(){
  quizScore = 0;
  for(let i=0;i<quizOrder.length;i++){
    const q = POOL_PERSONA[quizOrder[i]];
    if(quizAns[i] === q.ans) quizScore += 20;
  }
}

/* ===== 结果页 ===== */
function showResult(){
  document.querySelector('.title').style.display = 'none';
  phase = 'result';
  reportEvent('submit_clk', { content: buildSummaryText('complete') });
  let tier = TIERS[0];
  for(const t of TIERS){
    if(quizScore >= t.min && quizScore <= t.max) tier = t;
  }

  let imgKey = 'tier03';
  if(quizScore <= 20) imgKey = 'tier01';
  else if(quizScore <= 40) imgKey = 'tier02';
  else if(quizScore <= 60) imgKey = 'tier03';
  else if(quizScore <= 80) imgKey = 'tier04';
  else imgKey = 'tier05';

  const imgSrc = IMG[imgKey] || '';

  document.getElementById('screen').innerHTML = `
    <div class="result">
      <div class="card-wrapper">
        <div class="welcome-title">小麦の默契问答</div>
        ${imgSrc ? `<img class="photo" src="${imgSrc}" alt="结果">` : ''}
        <div class="score">${quizScore}<span class="pct">/100</span></div>
        <div class="tier-name">${tier.name}</div>
        <div class="comment">${tier.comment}</div>
        <div class="char-intro">
          <div style="font-weight:700;color:var(--pink-deep);font-size:14px;margin-bottom:6px;">考试小结——</div>
          ${tier.summary}
        </div>
        <div class="btn-row">
          <button class="btn mint" onclick="goChat()" style="margin-top:10px;font-size:15px;">和小麦聊天 💬</button>
          <button class="btn" onclick="handleReplay()" style="margin-top:10px;font-size:15px;">再来一次 ▶</button>
        </div>
      </div>
    </div>
  `;
}

/* ===== 去聊天 ===== */
function goChat(){
  reportEvent('share_clk', { content: buildSummaryText(quizAns.filter(a=>a!==-1).length >= 5 ? 'complete' : 'partial') });
  window.open(CHAT_URL, '_blank');
}

/* ===== 再来一次：无限重玩 ===== */
function handleReplay(){
  reportEvent('retry_clk');
  renderStart();
}

/* ===== 防重弹框 ===== */
function showReplayModal(){
  document.getElementById('replayModal').style.display = 'flex';
}
function closeReplayModal(){
  document.getElementById('replayModal').style.display = 'none';
}
function forceReplay(){
  closeReplayModal();
  renderStart();
}

/* ===== Toast 提示 ===== */
function showToast(msg){
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;z-index:9999;opacity:0;transition:opacity .3s;';
  document.body.appendChild(t);
  requestAnimationFrame(()=>t.style.opacity='1');
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300);},2000);
}


/* ===== BGM ===== */
const bgm     = document.getElementById('bgm');
const bgmBtn  = document.getElementById('bgmToggle');
let bgmPlaying = false;

bgmBtn.onclick = ()=>{
  if(bgmPlaying){
    bgm.pause();
    bgmPlaying = false;
    bgmBtn.textContent = '🔇 BGM';
    bgmBtn.classList.remove('on');
  } else {
    bgm.play().then(()=>{
      bgmPlaying = true;
      bgmBtn.textContent = '🔊 BGM';
      bgmBtn.classList.add('on');
    }).catch(()=>{
      bgm.load();
      bgm.play().then(()=>{
        bgmPlaying = true;
        bgmBtn.textContent = '🔊 BGM';
        bgmBtn.classList.add('on');
      });
    });
  }
};

/* ===== 上报事件挂载 ===== */
window.addEventListener('load', () => { reportEvent('pv'); });
document.addEventListener('visibilitychange', () => {
  if(document.visibilityState === 'hidden' && !REPORT_STATE.reported){
    REPORT_STATE.reported = true;
    reportEventBeacon('exp', { withStayDuration: true });
  }
});

/* ===== 初始化 ===== */
renderStart();
</script>

  <div class="modal-overlay" id="replayModal" style="display:none;">
    <div class="modal-box">
      <div class="modal-title">⏰ 今日已挑战</div>
      <div class="modal-body">
        <span class="highlight">明天再来挑战满分吧～</span><br>
        每日题目更新，满分会有小惊喜哦！<br>
        小麦在这里等你回来 😊
      </div>
      <div class="modal-btn-row">
        <button class="btn ghost" onclick="goChat()" style="flex:1;">明天再来</button>
      </div>
    </div>
  </div>

</body>
</html>
