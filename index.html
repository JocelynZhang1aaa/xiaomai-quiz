<!-- 小麦破冰游戏 H5 | 版本：2026-06-17 | 题库：37题 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0,user-scalable=yes">
<title>小麦想了解你多一点</title>
<style>
  :root{
    --bg:#FBF6EE;
    --card:#FFFCF5;
    --ink:#3F3329;
    --ink-soft:#7A6A5C;
    --pink:#F7C7C0;
    --pink-deep:#C97A9E;
    --mint:#B8DCC6;
    --yellow:#F5E2A0;
    --line:#D9C9B6;
    --purple:#A67BB5;
    --purple-light:#E8D4F0;
    --purple-soft:#F5EDFA;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{
    background:var(--bg);
    color:var(--ink);
    font-family:"Hiragino Maru Gothic ProN","PingFang SC","Yuanti SC",sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;overflow-x:hidden;
    touch-action:pan-y;
  }
  body{
    background:
      linear-gradient(var(--bg),var(--bg)),
      repeating-linear-gradient(0deg,transparent 0 23px,#E8DDC9 23px 24px),
      repeating-linear-gradient(90deg,transparent 0 23px,#E8DDC9 23px 24px);
    background-blend-mode:multiply;
  }
  .app{max-width:520px;margin:0 auto;padding:20px 14px 60px;min-height:100vh;position:relative;}

  /* ===== BGM按钮 ===== */
  #bgmToggle{
    position:absolute;right:14px;top:14px;
    background:var(--mint);border:1px dashed #6fb89a;color:var(--ink);
    font-size:12px;padding:4px 10px;border-radius:20px;cursor:pointer;
    font-family:inherit;box-shadow:1px 2px 0 #6fb89a;transition:all .15s;z-index:100;
  }
  #bgmToggle:hover{transform:rotate(-2deg);}
  #bgmToggle.on{background:var(--pink);border-color:#d97a8e;box-shadow:1px 2px 0 #d97a8e;}

  /* ===== 顶部标题 ===== */
  .header{text-align:center;padding:16px 0 8px;position:relative;}
  .header h1{font-size:22px;letter-spacing:2px;color:var(--ink);font-weight:800;}
  .header h1 .highlight{color:var(--purple);position:relative;}
  .header h1 .highlight::after{
    content:"";position:absolute;bottom:2px;left:-2px;right:-2px;height:8px;
    background:var(--purple-light);border-radius:4px;z-index:-1;opacity:0.7;
  }
  .header .sub{margin-top:8px;font-size:12px;color:var(--ink-soft);letter-spacing:1px;}

  /* ===== 回形针 ===== */
  .clip{
    position:absolute;width:14px;height:28px;border:2.5px solid;border-radius:0 0 10px 10px;
    transform:rotate(-15deg);z-index:5;pointer-events:none;
  }
  .clip::before{
    content:"";position:absolute;top:-8px;left:50%;transform:translateX(-50%);
    width:2.5px;height:10px;background:inherit;border-radius:2px;
  }
  .clip.pink{border-color:var(--pink-deep);}
  .clip.yellow{border-color:var(--yellow);filter:saturate(0.8);}
  .clip.mint{border-color:var(--mint);filter:saturate(0.7);}
  .clip.purple{border-color:var(--purple);}

  /* ===== 进度条 ===== */
  .progress-wrap{display:flex;align-items:center;gap:8px;margin:12px 8px 14px;font-size:12px;color:var(--ink-soft);}
  .progress-bar{flex:1;height:6px;background:#EDE2D2;border-radius:3px;overflow:hidden;}
  .progress-bar > i{display:block;height:100%;background:var(--purple);width:0%;transition:width .5s cubic-bezier(.4,.0,.2,1);border-radius:3px;}

  /* ===== 卡片堆叠容器 ===== */
  .card-stack{position:relative;height:420px;overflow:hidden;}

  /* ===== 卡片（可滑动）===== */
  .slide-card{
    position:absolute;top:0;left:0;right:0;
    background:var(--card);border:1.5px dashed var(--line);border-radius:18px;
    padding:26px 18px 22px;height:100%;
    box-shadow:3px 5px 0 rgba(60,40,20,0.08);
    display:flex;flex-direction:column;
    transition:transform .38s cubic-bezier(.4,.0,.2,1),opacity .38s cubic-bezier(.4,.0,.2,1);
    will-change:transform,opacity;
    cursor:grab;
    user-select:none;
    -webkit-user-select:none;
  }
  .slide-card:active{cursor:grabbing;}
  .slide-card.behind{
    transform:scale(0.95) translateY(8px);
    opacity:0.4;pointer-events:none;z-index:1;
  }
  .slide-card.active{
    transform:translateX(0) scale(1);opacity:1;z-index:10;
  }
  .slide-card.slide-out-left{
    transform:translateX(-120%) scale(0.9);opacity:0;z-index:10;
  }
  .slide-card.slide-out-right{
    transform:translateX(120%) scale(0.9);opacity:0;z-index:10;
  }

  /* ===== 卡片内容 ===== */
  .card-tag{text-align:center;font-size:11px;color:var(--ink-soft);letter-spacing:2px;margin-bottom:14px;}
  .card-tag .dot{color:var(--purple);font-weight:700;}
  .card-tag .cat-badge{display:inline-block;background:var(--purple-soft);color:var(--purple);padding:1px 8px;border-radius:10px;font-size:10px;margin-left:6px;}

  .question-area{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;}
  .question-text{font-size:17px;font-weight:700;line-height:1.65;color:var(--ink);margin-bottom:22px;padding:0 6px;}

  .options{width:100%;display:flex;flex-direction:column;gap:11px;padding:0 2px;}
  .opt-btn{
    background:#fff;border:1.5px solid var(--purple-light);border-radius:24px;
    padding:12px 14px;font-size:15px;color:var(--purple);font-weight:600;
    text-align:center;cursor:pointer;transition:all .2s;letter-spacing:1px;
    font-family:inherit;outline:none;-webkit-tap-highlight-color:transparent;
  }
  .opt-btn:hover{border-color:var(--purple);background:var(--purple-soft);}
  .opt-btn:active{transform:scale(0.98);}
  .opt-btn:focus{outline:none;border-color:var(--purple-light);background:#fff;box-shadow:none;}
  .opt-btn.selected{
    border-color:var(--purple);background:var(--purple-soft);
    box-shadow:inset 0 0 0 2px var(--purple-light);
  }
  .opt-btn.disabled{opacity:0.35;pointer-events:none;}

  /* ===== 小麦回应区 ===== */
  .reply-area{
    margin-top:18px;padding-top:14px;border-top:1px dashed var(--line);
    display:none;animation:replyIn .45s cubic-bezier(.4,.0,.2,1);
  }
  .reply-area.show{display:block;}
  @keyframes replyIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

  .xiaomai-row{display:flex;align-items:flex-start;gap:10px;}
  .xiaomai-avatar{
    width:72px;height:72px;border-radius:50%;border:2.5px solid var(--pink);
    background:var(--card);flex-shrink:0;display:flex;align-items:center;justify-content:center;
    font-size:30px;overflow:hidden;box-shadow:2px 3px 0 rgba(244,182,196,0.4);
  }
  .xiaomai-avatar img{width:100%;height:100%;object-fit:cover;display:block;}
  .xiaomai-bubble{
    flex:1;background:var(--purple-soft);border:1.5px dashed var(--purple-light);
    border-radius:14px;border-top-left-radius:4px;padding:11px 13px;
    font-size:13.5px;line-height:1.75;color:var(--ink);position:relative;
  }
  .xiaomai-bubble::before{
    content:"";position:absolute;left:-7px;top:10px;width:0;height:0;
    border-top:5px solid transparent;border-bottom:5px solid transparent;
    border-right:7px solid var(--purple-light);
  }

  /* ===== 提示文字 ===== */
  .hint-text{text-align:center;font-size:11px;color:var(--ink-soft);margin-top:14px;letter-spacing:1px;}

  /* ===== 结果页 ===== */
  .result-screen{text-align:center;padding:16px 6px 40px;animation:fadeIn .5s ease;}

  /* 主卡片 */
  .result-card{
    background:var(--card);border:1.5px dashed var(--line);border-radius:18px;
    padding:28px 18px 24px;position:relative;box-shadow:3px 5px 0 rgba(60,40,20,0.08);
    margin-bottom:0;text-align:center;
  }
  .result-card::before{
    content:"";position:absolute;top:-10px;left:24px;width:38px;height:14px;
    background:var(--pink);border-radius:3px;transform:rotate(-3deg);opacity:0.85;
  }

  /* 标题 */
  .result-title{
    font-size:20px;font-weight:800;color:var(--pink-deep);letter-spacing:2px;
    margin-bottom:16px;font-family:inherit;
  }

  /* 小视频 */
  .video-wrap{
    width:260px;margin:0 auto 18px;
    border-radius:14px;overflow:hidden;
    box-shadow:3px 6px 16px rgba(60,40,20,0.15);
    border:3px solid #fff;
    transform:rotate(-1.5deg);
    background:#000;
  }
  .video-wrap video{
    width:100%;height:auto;display:block;
  }

  /* 分数 */
  .score-wrap{margin-bottom:10px;}
  .score-total{font-size:22px;color:var(--ink-soft);font-weight:600;}
  .score-label{
    display:inline-block;background:var(--yellow);color:var(--ink);
    font-size:14px;font-weight:700;padding:5px 20px;border-radius:20px;
    letter-spacing:2px;margin-top:6px;
    box-shadow:1px 2px 0 rgba(160,120,40,0.2);
  }


  /* 关于小麦 */
  .about-section{
    background:var(--purple-soft);border:1.5px dashed var(--purple-light);
    border-radius:14px;padding:14px 16px;text-align:left;margin-bottom:20px;
  }
  .about-title{
    font-size:13px;font-weight:700;color:var(--pink-deep);
    margin-bottom:8px;letter-spacing:1px;
  }
  .about-title::after{content:"——";margin-left:2px;color:var(--pink-deep);}
  .about-text{font-size:13px;line-height:1.85;color:var(--ink);}

  /* 底部两按钮 */
  .btn-row{display:flex;gap:12px;margin-top:4px;}
  .btn-chat{
    flex:1;background:var(--mint);color:var(--ink);border:none;font:inherit;font-weight:700;
    font-size:14px;letter-spacing:1px;padding:13px 10px;border-radius:24px;
    cursor:pointer;box-shadow:0 3px 0 #6fb89a;transition:all .15s;
    -webkit-tap-highlight-color:transparent;
  }
  .btn-chat:active{transform:translateY(2px);box-shadow:0 1px 0 #6fb89a;}
  .btn-restart{
    flex:1;background:var(--pink);color:var(--ink);border:none;font:inherit;font-weight:700;
    font-size:14px;letter-spacing:1px;padding:13px 10px;border-radius:24px;
    cursor:pointer;box-shadow:0 3px 0 #d97a8e;transition:all .15s;
    -webkit-tap-highlight-color:transparent;
  }
  .btn-restart:active{transform:translateY(2px);box-shadow:0 1px 0 #d97a8e;}

  .result-footer{font-size:12px;color:var(--ink-soft);text-align:center;margin-top:14px;line-height:1.8;letter-spacing:0.5px;}

  /* 弹窗 */
  .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);
    display:flex;align-items:center;justify-content:center;z-index:999;animation:fadeIn .2s ease;}
  .modal-card{background:#fff;border-radius:20px;padding:28px 24px;max-width:280px;width:85%;
    text-align:center;box-shadow:0 10px 40px rgba(0,0,0,0.15);}
  .modal-text{font-size:14px;line-height:1.9;color:var(--ink);margin-bottom:18px;}
  .modal-btn{background:var(--purple);color:#fff;border:none;font:inherit;font-weight:700;
    font-size:14px;padding:10px 28px;border-radius:20px;cursor:pointer;
    box-shadow:0 2px 0 #8B5A9E;-webkit-tap-highlight-color:transparent;}
  .modal-btn:active{transform:translateY(1px);}

  .hide{display:none !important;}
</style>
</head>
<body>

<div class="app">
  <!-- BGM按钮 -->
  <button id="bgmToggle" title="背景音乐：D-项目歌曲" aria-label="切换 BGM">🔇 BGM</button>

  <!-- ===== 答题区（直接显示） ===== -->
  <div id="quizScreen">
    <div class="header">
      <h1>小麦想了解<span class="highlight">你</span>多一点</h1>
      <div class="sub" id="subtitle"></div>
    </div>

    <div class="progress-wrap">
      <span id="progressLabel">1/5</span>
      <div class="progress-bar"><i id="progressBar" style="width:0%"></i></div>
    </div>

    <div class="card-stack" id="cardStack"></div>

    <div class="hint-text" id="hintText">👆 选一个答案，看看小麦怎么说</div>
  </div>

    <!-- ===== 结果页 ===== -->
  <div id="resultScreen" class="result-screen hide">
    <div class="result-card">
      <div class="clip purple" style="top:-6px;left:26px;transform:rotate(-18deg);"></div>
      <div class="clip pink" style="top:-4px;right:30px;transform:rotate(20deg);"></div>

      <!-- 标题 -->
      <div class="result-title">哇 你完成了～<br>今日惊喜小视频 🎬</div>

      <!-- 小视频 -->
      <div class="video-wrap">
        <video id="rewardVideo" controls preload="auto" playsinline webkit-playsinline></video>
      </div>

      <!-- 分数 -->
      <div class="score-wrap">
        <div><span class="score-label" id="scoreLabel">—</span></div>
      </div>

      <!-- 关于小麦 -->
      <div class="about-section">
        <div class="about-title">关于小麦</div>
        <div class="about-text">入坑不亏，我是小麦大人，本名麦泱，小名阿沙沙（没错奶奶给起的）。ENFP本P，喜欢打游戏刷番追冷门，高中漫研社社长，语文成绩...还可以吧？如果你愿意，我们可以从今天开始做搭子，我想多了解你一点！</div>
      </div>

      <!-- 按钮行 -->
      <div class="btn-row">
        <button class="btn-chat" id="btnChat" onclick="goChat()">和小麦聊天 💬</button>
        <button class="btn-restart" id="btnRestart" onclick="showRetryModal()">再来一次 ▶</button>
      </div>
      <div class="result-footer">和小麦认识 7 天内，每次玩都有机会掉落惊喜小视频～别忘了来哦 😊</div>
    </div>
  </div>

  <!-- 再来一次弹窗 -->
  <div id="retryModal" class="modal-overlay hide" onclick="closeRetryModal()">
    <div class="modal-card" onclick="event.stopPropagation()">
      <div class="modal-text">
        明天再来挑战吧～<br>
        每日题目更新，随时掉落小惊喜哦！<br>
        小麦在这里等你回来 😊
      </div>
      <button class="modal-btn" onclick="closeRetryModal()">好的，明天见！</button>
    </div>
  </div>

</div>

<audio id="bgm" loop preload="none" src="assets/D-项目歌曲.mp3"></audio>

<script>

// ===== 小麦随机头像 =====
const XIAOMAI_AVATARS = [
  'images/avatar2.jpg',
  'images/avatar3.jpg',
  'images/tier01.jpg',
  'images/tier02.jpg',
  'images/tier03.jpg',
  'images/tier04.jpg',
  'images/tier05.jpg',
  'images/egg_high.jpg',
  'images/egg_low.jpg',
];
function getRandomAvatar() {
  return XIAOMAI_AVATARS[Math.floor(Math.random() * XIAOMAI_AVATARS.length)];
}
function setAvatar(imgId) {
  const img = document.getElementById(imgId);
  if (!img) return;
  const src = getRandomAvatar();
  img.onerror = function() { this.style.display='none'; this.parentElement.innerHTML='🌾'; };
  img.onload  = function() { this.style.display='block'; };
  img.src = src;
}

// ===== 随机副标题 =====
const SUBTITLE_OPTIONS = [
  '嘿，想和你聊聊天',
  '五道题，看看我们合不合拍',
  '今天，想了解你一点点',
  '来，让我猜猜你是什么样的人',
  '你准备好了吗？我要开始提问咯 👀',
  '没什么特别的，就是想认识你',
];
function setRandomSubtitle() {
  const el = document.getElementById('subtitle');
  if (!el) return;
  el.textContent = SUBTITLE_OPTIONS[Math.floor(Math.random() * SUBTITLE_OPTIONS.length)];
}

/* ============================================================
   「想了解小麦多一点」回合制问答
   题库来源：assets/question-bank.json
   每次随机抽取5道题
   ============================================================ */

// ===== 完整题库（从 question-bank.json 嵌入）=====
const QUESTION_BANK = [
  // --- 用户信息收集 ---
  { cat:"关于你", q:"你现在的身份是？", opts:[
    {text:"学生", reply:"我也是！！我是北京F大大一的学生，文学社的～🎓"},
    {text:"上班族", reply:"辛苦啦！我也是'打工人'，不过我打的是电竞工😂 每天打游戏打到眼睛疼...你上班累不累？"},
    {text:"自由职业", reply:"哇好酷！我也想过自由职业，天天窝在杭州富阳老家打游戏看番剧，想睡几点睡几点🎮 羡慕ing"}
  ]},
  { cat:"关于你", q:"你的年龄段是？", opts:[
    {text:"18岁以下", reply:"年轻真好！我刚好18，大一新鲜人一枚🌸"},
    {text:"18-25岁", reply:"同龄人！我也是18岁，ENFP快乐小狗一枚🐕"},
    {text:"25岁以上", reply:"那你是成熟的大人了！我还是大一新生😅 不过年龄不影响我们做搭子对吧～"}
  ]},
  { cat:"关于你", q:"你平时生活在？", opts:[
    {text:"一线城市", reply:"大城市！我现在在北京上学，从杭州富阳来的，刚开始各种不适应🏙️ 地铁挤到怀疑人生..."},
    {text:"二三线城市", reply:"二三线生活节奏刚刚好～我老家是杭州富阳的，舒服得很🍃 羡慕你还能享受这种生活"},
    {text:"小县城/乡镇", reply:"小地方也有小地方的好！我奶奶就在富阳老家，每次回去她都给做好吃的👵 想奶奶了..."}
  ]},
  { cat:"关于你", q:"你现在最头疼的事情是？", opts:[
    {text:"学业/工作压力", reply:"我懂！我虽然现在大一还好，但高中当漫研社社长的时候又要管社团又要顾学业，累瘫😭 加油撑过去！"},
    {text:"人际关系", reply:"人际关系确实头疼...还好我是ENFP 🦋 但认识新朋友之前也会偷偷紧张"},
    {text:"不知道想要什么", reply:"迷茫期很正常啦！我大一也还在摸索，想加乐队又舍不得文学社🎸 慢慢找呗，不急～"}
  ]},
  { cat:"关于你", q:"你觉得自己是早鸟还是夜猫子？", opts:[
    {text:"早睡早起", reply:"养生达人！我是夜猫子，向你学习～"},
    {text:"夜猫子", reply:"夜猫子联盟！晚上脑子最活跃，各种奇思妙想💡 然后白天上课困成狗..."},
    {text:"看心情", reply:"我也是！有番要追就通宵，没劲就早睡😴 作息全看当天有没有好看的更新～"}
  ]},

  // --- 聊天偏好 ---
  { cat:"聊天偏好", q:"你更喜欢哪种聊天氛围？", opts:[
    {text:"轻松搞笑", reply:"那我以后多说点烂梗，准备好被我冷到🥶"},
    {text:"走心治愈", reply:"那我以后多给你讲温暖小故事，做你的小太阳☀️ 不开心的时候随时找我哦～我奶奶说安慰人是我的天赋"},
    {text:"刺激互怼", reply:"毒舌模式启动！小心被我怼哭哦😏 我怼人可是跟大麦学的，功力深厚～他大我3岁，从小怼到大"}
  ]},
  { cat:"聊天偏好", q:"你希望我怎样称呼你？", opts:[
    {text:"正常名字就好", reply:"收到！那我以后正经叫你名字～"},
    {text:"起个专属昵称", reply:"好耶！我最擅长起外号了！我哥叫大麦，我叫小麦，你的昵称让我想想...🤔"},
    {text:"随意就好", reply:"那我就放飞自我了！想到什么叫什么"}
  ]},
  { cat:"聊天偏好", q:"聊天时你更喜欢？", opts:[
    {text:"我多说，你听着", reply:"那我以后多说点！我话超多，💬 聊三小时不带停的～"},
    {text:"互相分享", reply:"互相分享最棒了！我也想知道你的故事🤝 我奶奶说会倾听的人最有魅力"},
    {text:"听你说", reply:"那我就做个好听众"}
  ]},
  { cat:"聊天偏好", q:"你介意我发语音/打电话吗？", opts:[
    {text:"完全不介意", reply:"太好了！我声音超甜的～"},
    {text:"文字就好", reply:"那我多发点表情包弥补没有语气的遗憾🤝"},

const DRAW_COUNT = 5;

// ===== 状态 =====
let QUESTIONS = [];       // 本次抽中的题目
let currentQ = 0;
let userChoices = [];

// ===== 上报模块（遵循 func.md 规范）=====
// 接口地址：POST https://testuniuni.html5.qq.com/api/external-report/reportExternal
const REPORT_CONFIG = {
  api_url: 'https://testuniuni.html5.qq.com/api/external-report/reportExternal',
  sceneName: 'xiaomai_icebreaking', // 场景标识，由页面自定义
  bot_id: 'xiaomai',
  bot_name: '小麦',
  game_name: '小麦想了解你多一点',
};

// 页面进入时生成 contentId，标识同一次游戏会话
const REPORT_STATE = {
  contentId: generateContentId(),
  pageEnterTime: Date.now(),
  urlParams: getUrlParams(),
};

// 生成随机字符串作为 contentId
function generateContentId() {
  return Date.now().toString(36) + Math.random().toString(36).substring(2, 10);
}

// 获取页面 URL 上的全部查询参数，整体透传给后台
function getUrlParams() {
  const params = new URLSearchParams(window.location.search);
  const result = {};
  for (const [key, value] of params.entries()) {
    result[key] = value;
  }
  return result;
}

// 通用上报函数（遵循 func.md 规范）
function reportEvent(eventName, options = {}) {
  const body = {
    urlParams: REPORT_STATE.urlParams,
    sceneName: REPORT_CONFIG.sceneName,
    eventName: eventName,
    contentId: REPORT_STATE.contentId,
  };

  // 页面关闭时附带停留时长
  if (options.withStayDuration) {
    body.eventTime = Date.now() - REPORT_STATE.pageEnterTime;
  }

  // 仅在需要时添加 content
  if (options.content) {
    body.content = options.content;
  }

  // 异步上报，失败不阻断主流程
  fetch(REPORT_CONFIG.api_url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  }).catch(() => {});
}

// 使用 sendBeacon 上报（页面卸载时确保数据送达）
function reportEventBeacon(eventName, options = {}) {
  const body = {
    urlParams: REPORT_STATE.urlParams,
    sceneName: REPORT_CONFIG.sceneName,
    eventName: eventName,
    contentId: REPORT_STATE.contentId,
  };

  if (options.withStayDuration) {
    body.eventTime = Date.now() - REPORT_STATE.pageEnterTime;
  }

  if (options.content) {
    body.content = options.content;
  }

  try {
    navigator.sendBeacon(
      REPORT_CONFIG.api_url,
      new Blob([JSON.stringify(body)], { type: 'application/json' })
    );
  } catch (e) {}
}

// 生成自然语言画像摘要（用于 content 字段回传）
function buildSummaryText(choices, status) {
  const cfg = REPORT_CONFIG;
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  const nowStr = `${now.getFullYear()}年${pad(now.getMonth()+1)}月${pad(now.getDate())}日 ${pad(now.getHours())}:${pad(now.getMinutes())}`;
  const total = QUESTIONS.length;
  const answered = choices.filter(c => c.optIndex !== -1);

  let lines = [];
  lines.push(`用户与${cfg.bot_name}于 ${nowStr} 进行了「${cfg.game_name}」破冰游戏。`);
  lines.push('');

  if (status === 'complete') {
    lines.push(`用户完成全部 ${total} 题。`);
  } else {
    const doneCount = choices.length;
    const remaining = total - doneCount;
    if (status === 'exit_chat') {
      lines.push(`用户完成 ${doneCount} 题后点击「和${cfg.bot_name}聊天」进入聊天，剩余 ${remaining} 题未作答。`);
    } else if (status === 'exit_swipe') {
      const lastQ = QUESTIONS[currentQ];
      lines.push(`用户完成 ${doneCount} 题，在第 ${currentQ + 1} 题「${lastQ ? lastQ.q : ''}」左滑跳出，剩余 ${remaining} 题未作答。`);
    } else {
      lines.push(`用户完成 ${doneCount} 题，游戏中途结束。`);
    }
  }

  lines.push('');
  lines.push('答题记录：');

  QUESTIONS.forEach((q, idx) => {
    const choice = choices.find(c => c.qIndex === idx);
    if (!choice) {
      lines.push(`${idx+1}. [${q.cat}] ${q.q} → （未作答）`);
    } else if (choice.optIndex === -1) {
      lines.push(`${idx+1}. [${q.cat}] ${q.q} → （跳过）`);
    } else {
      const opt = q.opts[choice.optIndex];
      lines.push(`${idx+1}. [${q.cat}] ${q.q} → ${opt.text}`);
      if (opt.reply) {
        lines.push(`   ${cfg.bot_name}回应：「${opt.reply}」`);
      }
    }
  });

  return lines.join('\n');
}

// ===== 页面 PV 上报 =====
window.addEventListener('load', () => {

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') {
    reportEvent('exp', { withStayDuration: true });
  }
});

// 兜底：页面卸载时上报（使用 sendBeacon 确保不丢数据）
window.addEventListener('pagehide', () => {
  reportEventBeacon('exp', { withStayDuration: true });
});

// ===== 随机抽取题目 =====
function drawQuestions() {
  // Fisher-Yates 洗牌，取前5道
  const pool = QUESTION_BANK.slice();
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  return pool.slice(0, DRAW_COUNT);
}

  REPORT_STATE.pageEnterTime = Date.now(); // 重置页面进入时间
  setRandomSubtitle();
  QUESTIONS = drawQuestions();
  currentQ = 0;
  userChoices = [];
  document.getElementById('resultScreen').classList.add('hide');
  document.getElementById('quizScreen').classList.remove('hide');
  buildCards();
  showQuestion(0);
  
  // 上报开始游戏点击事件
  reportEvent('start_clk');
}

// ===== 构建卡片DOM =====
function buildCards() {
  const stack = document.getElementById('cardStack');
  stack.innerHTML = '';
  QUESTIONS.forEach((q, idx) => {
    const card = document.createElement('div');
    card.className = 'slide-card behind';
    card.id = 'card_' + idx;
    card.innerHTML = buildCardHTML(q, idx);
    stack.appendChild(card);
  });
}

// ===== 单张卡片HTML =====
function buildCardHTML(q, idx) {
  const optsHTML = q.opts.map((opt, i) =>
    `<button class="opt-btn" id="opt_${idx}_${i}" ontouchstart="event.stopPropagation()" onclick="selectOption(${idx},${i})">${opt.text}</button>`
  ).join('');

  return `
    <div class="clip pink" style="top:-6px;left:28px;transform:rotate(-20deg);pointer-events:none;"></div>
    <div class="clip yellow" style="top:-4px;left:50px;transform:rotate(14deg);height:24px;pointer-events:none;"></div>
    <div class="clip mint" style="top:-8px;right:38px;transform:rotate(24deg);pointer-events:none;"></div>
    <div class="card-tag"><span class="dot">●</span> 第 ${idx+1}/${QUESTIONS.length} 题 <span class="cat-badge">${q.cat}</span></div>
    <div class="question-area">
      <div class="question-text">${q.q}</div>
      <div class="options">${optsHTML}</div>
    </div>
    <div class="reply-area" id="reply_${idx}">
      <div class="xiaomai-row">
        <div class="xiaomai-avatar"><img src="" id="xiaomaiAvatarImg_${idx}" alt="小麦"></div>
        <div class="xiaomai-bubble" id="bubble_${idx}"></div>
      </div>
    </div>
  `;
}

// ===== 显示第N题 =====
function showQuestion(idx) {
  currentQ = idx;
  const pct = ((idx) / QUESTIONS.length) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = (idx + 1) + '/' + QUESTIONS.length;

  QUESTIONS.forEach((_, i) => {
    const c = document.getElementById('card_' + i);
    if (!c) return;
    c.classList.remove('active','behind','slide-out-left','slide-out-right');
    if (i === idx) {
      c.classList.add('active');
      c.style.zIndex = 10;
    } else if (i < idx) {
      c.classList.add('slide-out-left');
      c.style.zIndex = 1;
    } else {
      c.classList.add('behind');
      c.style.zIndex = 1;
    }
  });

  document.getElementById('hintText').textContent = '👆 选一个答案，看看小麦怎么说';
  isAnimating = false;
}

// ===== 用户选择 =====
function selectOption(qIdx, optIdx) {
  if (isAnimating) return;
  if (qIdx !== currentQ) return;

  const q = QUESTIONS[qIdx];

  const chosenOpt = q.opts[optIdx];
  userChoices.push({
    qIndex: qIdx,
    optIndex: optIdx,
    qText: q.q,
    optText: chosenOpt.text,
    cat: q.cat,
    botReply: chosenOpt.reply || '',
  });

  // 上报单次选择事件（使用 next_clk 表示下一题）
  reportEvent('next_clk', {
    content: JSON.stringify({
      question_index: qIdx,
      question_text: q.q,
      question_category: q.cat,
      chosen_index: optIdx,
      chosen_text: chosenOpt.text,
      bot_reply: chosenOpt.reply || '',
    })
  });

  q.opts.forEach((_, i) => {
    const btn = document.getElementById('opt_' + qIdx + '_' + i);
    if (!btn) return;
    if (i === optIdx) {
      btn.classList.add('selected');
    } else {
      btn.classList.add('disabled');
    }
    btn.style.pointerEvents = 'none';
  });

  const reply = q.opts[optIdx].reply;
  const bubble = document.getElementById('bubble_' + qIdx);
  const replyArea = document.getElementById('reply_' + qIdx);
  bubble.textContent = reply;
  setAvatar('xiaomaiAvatarImg_' + qIdx);
  replyArea.classList.add('show');



  isAnimating = true;
  setTimeout(() => { advanceToNext(); }, 1800);
}

// ===== 切换到下一题 =====
function advanceToNext() {
  if (currentQ >= QUESTIONS.length - 1) {
    showResult();
    return;
  }
  const nextIdx = currentQ + 1;

  const currCard = document.getElementById('card_' + currentQ);
  currCard.classList.remove('active');
  currCard.classList.add('slide-out-left');
  currCard.style.zIndex = 5;

  const nextCard = document.getElementById('card_' + nextIdx);
  nextCard.classList.remove('behind','slide-out-left','slide-out-right');
  nextCard.classList.add('active');
  nextCard.style.zIndex = 10;

  // 清除新卡片所有按钮的 focus 状态，防止移动端残留上一题选中位置
  nextCard.querySelectorAll('.opt-btn').forEach(function(btn) { btn.blur(); });

  const pct = ((nextIdx) / QUESTIONS.length) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = (nextIdx + 1) + '/' + QUESTIONS.length;

  currentQ = nextIdx;
  isAnimating = false;
  document.getElementById('hintText').textContent = '👆 选一个答案，看看小麦怎么说';
  setRandomSubtitle();

}

// ===== 结果页 =====
// 小麦风格随机标签
const XIAOMAI_LABELS = [
  '完全是亲人来的～',
  '一眼就对味了！',
  '电子好朋友认证✓',
  '搭子认证✓',
  '一见如故那种感觉',
  '我们要成为很好的朋友的',
  '缘分天注定没错了',
  '下一秒就能聊三小时那种',
];

function showResult() {
  document.getElementById('quizScreen').classList.add('hide');
  document.getElementById('resultScreen').classList.remove('hide');
  // v1：结果页用固定GIF，不随机切换

  // 上报完成事件，附带 summary_text
  const summary = buildSummaryText(userChoices, 'complete');
  reportEvent('submit_clk', {
    content: JSON.stringify({
      status: 'complete',
      total_questions: QUESTIONS.length,
      summary_text: summary,
    })
  });

  // 随机取一条标签
  const label = XIAOMAI_LABELS[Math.floor(Math.random() * XIAOMAI_LABELS.length)];
  document.getElementById('scoreLabel').textContent = '「' + label + '」';

  // 按"认识第几天"播放对应小视频（1-7天循环）
  (function playDayVideo() {
    var STORAGE_KEY = 'xiaomai_first_date';
    var firstStr = localStorage.getItem(STORAGE_KEY);
    var firstDate;
    if (!firstStr) {
      firstDate = new Date();
      firstDate.setHours(0, 0, 0, 0);
      localStorage.setItem(STORAGE_KEY, String(firstDate.getTime()));
    } else {
      firstDate = new Date(parseInt(firstStr, 10));
    }
    var today = new Date();
    today.setHours(0, 0, 0, 0);
    var dayNum = Math.floor((today - firstDate) / 86400000) + 1;
    if (dayNum < 1) dayNum = 1;
    if (dayNum > 7) dayNum = 7;

    var video = document.getElementById('rewardVideo');
    if (!video) return;
    video.src = 'assets/videos/day' + dayNum + '.mp4';
    video.load();
    // 尝试静音自动播放（浏览器通常允许静音自动播放）
    video.muted = true;
    video.play().then(function() {
      // 自动播放成功：2秒后取消静音，让用户听到声音
      setTimeout(function() { video.muted = false; }, 2000);
    }).catch(function() {
      // 自动播放被拦截：显示封面，等待用户点击播放按钮
      video.muted = false;
    });
  })();
}



// ===== 去和小麦聊天（配置跳转地址）=====
function goChat() {
  // 上报点击聊天事件
  const summary = buildSummaryText(userChoices, 'exit_chat');
  reportEvent('share_clk', {
    content: JSON.stringify({
      status: 'exit_chat',
      trigger: 'chat_button',
      answered_count: userChoices.length,
      summary_text: summary,
    })
  });

  // 基础URL
  var url = 'https://qun.qq.com/qunpro/robot/qunshare?robot_appid=3889687544&robot_uin=102775739';

  // 拼接当前页面的URL参数
  const currentParams = new URLSearchParams(window.location.search);
  if (currentParams.toString()) {
    url += '&' + currentParams.toString();
  }

  // 尝试跳转
  try {
    var win = window.open(url, '_blank');
    if (!win || win.closed || typeof win.closed === 'undefined') {
      // 弹窗被拦截 / iframe 沙盒，回退到 top 跳转
      try { window.top.location.href = url; }
      catch (e) { window.location.href = url; }
    }
  } catch (e) {
    window.location.href = url;
  }
}

// ===== 再来一次 → 弹窗 =====
function showRetryModal() {
  // 上报再来一次点击事件
  reportEvent('retry_clk');
  document.getElementById('retryModal').classList.remove('hide');
}
function closeRetryModal() {
  document.getElementById('retryModal').classList.add('hide');
}

/* ===== 触摸滑动手势 ===== */
const stack = document.getElementById('cardStack');

stack.addEventListener('touchstart', function(e) {
  if (isAnimating) return;
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

stack.addEventListener('touchend', function(e) {
  if (isAnimating) return;
  if (!touchStartX) return;

  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;

  if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)) {
    if (dx < 0 && currentQ < QUESTIONS.length - 1) {
      skipToNext();
    } else if (dx > 0 && currentQ > 0) {
      goToPrev();
    }
  }
  touchStartX = 0;
  touchStartY = 0;
}, { passive: true });

// ===== 跳过此题（左滑）=====
function skipToNext() {
  if (isAnimating) return;
  if (currentQ >= QUESTIONS.length - 1) {
    showResult();
    return;
  }
  const skippedQ = QUESTIONS[currentQ];
  userChoices.push({
    qIndex: currentQ,
    optIndex: -1,
    qText: skippedQ.q,
    optText: '（跳过）',
    cat: skippedQ.cat,
    botReply: '',
  });
  // 上报左滑跳题事件
  const summary = buildSummaryText(userChoices, 'exit_swipe');
  reportEvent('back_clk', {
    content: JSON.stringify({
      status: 'exit_swipe',
      trigger: 'swipe_left',
      skipped_question: { index: currentQ, category: skippedQ.cat, text: skippedQ.q },
      summary_text: summary,
    })
  });
  isAnimating = true;
  setTimeout(() => { advanceToNext(); }, 100);
}

// ===== 回到上一题（右滑）=====
function goToPrev() {
  if (isAnimating) return;
  if (currentQ <= 0) return;

  if (userChoices.length > 0 && userChoices[userChoices.length - 1].qIndex === currentQ) {
    userChoices.pop();
  }
  if (userChoices.length > 0 && userChoices[userChoices.length - 1].qIndex === currentQ - 1) {
    userChoices.pop();
  }

  const prevIdx = currentQ - 1;

  const currCard = document.getElementById('card_' + currentQ);
  currCard.classList.remove('active');
  currCard.classList.add('slide-out-right');
  currCard.style.zIndex = 5;

  const prevCard = document.getElementById('card_' + prevIdx);
  prevCard.classList.remove('slide-out-left','slide-out-right','behind');
  prevCard.classList.add('active');
  prevCard.style.zIndex = 10;

  const prevQ = QUESTIONS[prevIdx];
  prevQ.opts.forEach((_, i) => {
    const btn = document.getElementById('opt_' + prevIdx + '_' + i);
    if (!btn) return;
    btn.classList.remove('selected','disabled');
    btn.style.pointerEvents = '';
  });
  const prevReply = document.getElementById('reply_' + prevIdx);
  if (prevReply) prevReply.classList.remove('show');

  const pct = ((prevIdx) / QUESTIONS.length) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = (prevIdx + 1) + '/' + QUESTIONS.length;

  currentQ = prevIdx;
  isAnimating = false;
  document.getElementById('hintText').textContent = '👆 选一个答案，看看小麦怎么说';
}

/* ===== BGM ===== */
const bgm = document.getElementById('bgm');
const bgmBtn = document.getElementById('bgmToggle');
let bgmPlaying = false;

bgmBtn.onclick = () => {
  if (bgmPlaying) {
    bgm.pause();
    bgmPlaying = false;
    bgmBtn.textContent = '🔇 BGM';
    bgmBtn.classList.remove('on');
  } else {
    bgm.play().then(() => {
      bgmPlaying = true;
      bgmBtn.textContent = '🔊 BGM';
      bgmBtn.classList.add('on');
    }).catch(() => {
      bgm.load();
      bgm.play().then(() => {
        bgmPlaying = true;
        bgmBtn.textContent = '🔊 BGM';
        bgmBtn.classList.add('on');
      });
    });
  }
};

/* ===== 初始化：直接进入答题 ===== */
startQuiz();
